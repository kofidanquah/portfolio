<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" type="image/png" href="images/logo.png" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <title>Blog - Kofi Danquah</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/blog.css">
</head>

<body>
    <!-- ── HEADER ── -->
    <header>
        <div class="header-container">
            <div class="logo">
                <a href="index.html"><img src="images/logo.png" alt="KD" /></a>
            </div>
            <nav class="nav-links">
                <a href="index.html#skill">Skills</a>
                <a href="index.html#about">About</a>
                <a href="index.html#services">Services</a>
                <a href="index.html#projects">Projects</a>
                <a href="index.html#contact">Contact</a>
                <a href="blog.html" class="btn-blog">Blog</a>
            </nav>
            <div class="menu-btn" id="menu-btn"><i class="fa fa-bars"></i></div>
        </div>
        <div class="mobile-menu" id="mobile-menu">
            <a href="index.html#skill">Skills</a>
            <a href="index.html#about">About</a>
            <a href="index.html#services">Services</a>
            <a href="index.html#projects">Projects</a>
            <a href="index.html#contact">Contact</a>
            <a href="blog.html" class="btn-blog">Blog</a>
        </div>
    </header>

    <section class="hero">
        <h1>Welcome to My Blog</h1>
        <p>Insights, Stories, and Tutorials on Tech and Beyond</p>
    </section>

    <section class="blog-container container">
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="blog-post">
                    <img src="images/image1.jpg" alt="Blog Post Thumbnail">
                    <div class="blog-post-content">
                        <h3>My Journey as a Software Developer</h3>
                        <p>How I got this far</p>
                        <a href="myjourney.html">Read More</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- ── FOOTER ── -->
    <footer>
        <div class="footer-email">
            <i class="fa fa-envelope"></i> danquahkofi520@gmail.com
        </div>
        <div class="social-icons">
            <a href="https://www.linkedin.com/in/kofi-oduro-danquah-089a68277/" target="_blank" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
            <a href="https://github.com/kofidanquah" target="_blank" title="GitHub"><i class="fab fa-github"></i></a>
            <a href="https://wa.me/+233208595739" target="_blank" title="WhatsApp"><i class="fab fa-whatsapp"></i></a>
            <a href="https://www.twitter.com/kdanquah_" target="_blank" title="X / Twitter"><i class="fab fa-x-twitter"></i></a>
        </div>
        <p class="footer-copy">
            &copy; <span id="currentYear"></span> Kofi Danquah &mdash; All Rights Reserved
        </p>
    </footer>

    <button id="scrollToTopBtn" onclick="scrollToTop()">
      <i class="fa fa-arrow-up"></i>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Set current year
        document.getElementById("currentYear").textContent = new Date().getFullYear();

        // Mobile Menu
        const menuBtn = document.getElementById("menu-btn");
        const mobileMenu = document.getElementById("mobile-menu");
        menuBtn.addEventListener("click", () =>
            mobileMenu.classList.toggle("show"),
        );
        document.querySelectorAll("#mobile-menu a").forEach((link) => {
            link.addEventListener("click", () =>
                mobileMenu.classList.remove("show"),
            );
        });

        // Scroll to top button
        const scrollBtn = document.getElementById("scrollToTopBtn");
        window.onscroll = () => {
            if (document.documentElement.scrollTop > 150) {
                scrollBtn.classList.add("visible");
            } else {
                scrollBtn.classList.remove("visible");
            }
        };

        function scrollToTop() {
            window.scrollTo({
                top: 0,
                behavior: "smooth",
            });
        }
    </script>
</body>

</html>
